<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>

    <!--FAVICON-->
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">

    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather&display=swap"
        rel="stylesheet">

    <!--CSS-->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!--SECTION IMAGE-->
    <section class="section-image">
        <img src="img/about-us.png" alt="">
    </section>

    <!--SECTION FORM-->
    <section class="section-form">

        <!--TOP-->
        <div class="top">
            <span class="tag">Bem vindo de volta</span>
            <h1 class="title">Faça login na sua conta</h1>
        </div>

        <!--FORM-->
        <form class="form">

            <!--EMAIL-->
            <div class="form-container">
                <label class="label-email">E-mail</label>
                <input class="input-email" type="email" placeholder="Seu email">
            </div>

            <!--PASSWORD-->
            <div class="form-container">
                <label class="label-password">Senha</label>
                <input class="input-password" type="password" placeholder="********">
            </div>

            <!--REMEMBER ME-->
            <div class="remember-me">

                <!--CHECKBOX-->
                <div class="checkbox">
                    <input class="checkbox" type="checkbox"><span>Lembre de mim</span>
                </div>

                <!--LINK-->
                <a class="link" href="">Esqueceu a senha? </a>
            </div>

            <div class="buttons">
                <!--BTM LOGIN-->
                <button class="btn-login">Entrar</button>


                <!--BTN LOGIN WITH GOOGLE-->
                <a class="btn-login btn-google">
                    <img src="img/google-icon.png" alt="">
                    <p>Ou faça login com o Google</p>
                </a>

                <div class="register">
                    <span>Não tem uma conta?</span>
                    <a class="link" href="">Cadastre-se</a>
                </div>
            </div>
        </form>
    </section>
</body>

</html>
